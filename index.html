/* ---------------- Fabrication export: Gerber (RS-274X) + Excellon drill + CPL ---------------- */
function fabBase(){ return (state.project.meta.name||'pcb').replace(/[^\w.-]+/g,'_'); }
function gNum(mm){ return Math.round(mm*1e6).toString(); }     // FSLAX46 = 6 decimals, mm
function fabPads(){ const out=[];
  for(const f of state.project.pcb.footprints){ for(const p of fpPads(f))
    out.push({f,num:p.num,x:p.x,y:p.y,shape:p.shape,w:p.w,h:p.h,drill:p.drill,layers:p.layers}); }
  return out; }
// minimal Gerber writer. Y is negated so the output isn't upside-down vs the editor.
function makeGerber(){
  const aps=[]; const apMap=new Map(); const body=[]; let cur=-1;
  function getAp(def){ if(apMap.has(def))return apMap.get(def);
    const id=10+aps.length; aps.push({id,def}); apMap.set(def,id); return id; }
  function sel(id){ if(cur!==id){ body.push('D'+id+'*'); cur=id; } }
  return {
    circleAp:d=>getAp('C,'+(+(+d).toFixed(4))),
    rectAp:(w,h)=>getAp('R,'+(+w.toFixed(4))+'X'+(+h.toFixed(4))),
    flash(id,x,y){ sel(id); body.push('X'+gNum(x)+'Y'+gNum(-y)+'D03*'); },
    line(id,x1,y1,x2,y2){ sel(id); body.push('X'+gNum(x1)+'Y'+gNum(-y1)+'D02*');
      body.push('X'+gNum(x2)+'Y'+gNum(-y2)+'D01*'); },
    poly(id,pts){ if(pts.length<2)return; sel(id);
      body.push('X'+gNum(pts[0].x)+'Y'+gNum(-pts[0].y)+'D02*');
      for(let i=1;i<pts.length;i++) body.push('X'+gNum(pts[i].x)+'Y'+gNum(-pts[i].y)+'D01*'); },
    render(name){ let s='G04 '+name+' generated by PCB Studio*\n';
      s+='%FSLAX46Y46*%\n%MOMM*%\n%LPD*%\nG01*\n';
      for(const a of aps) s+='%ADD'+a.id+a.def+'*%\n';
      if(body.length) s+=body.join('\n')+'\n'; s+='M02*\n'; return s; }
  };
}
function gerberCopper(layer){ const g=makeGerber();
  for(const t of state.project.pcb.traces){ if(t.layer!==layer)continue;
    g.poly(g.circleAp(t.width), t.points); }
  for(const p of fabPads()){ if(!p.layers.includes(layer))continue;
    g.flash(p.shape==='rect'?g.rectAp(p.w,p.h):g.circleAp(p.w), p.x, p.y); }
  return g.render(layer+' copper'); }
function gerberMask(layer){ const g=makeGerber(); const e=0.1; // soldermask expansion
  for(const p of fabPads()){ if(!p.layers.includes(layer))continue;
    g.flash(p.shape==='rect'?g.rectAp(p.w+e,p.h+e):g.circleAp(p.w+e), p.x, p.y); }
  return g.render(layer+' soldermask'); }
function gerberSilk(layer){ const g=makeGerber(); const ap=g.circleAp(0.15);
  for(const f of state.project.pcb.footprints){ const def=fpDef(f); const hw=def.body.w/2,hh=def.body.h/2;
    g.poly(ap,[[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh],[-hw,-hh]].map(([x,y])=>{
      const r=rot(x,y,f.rot||0); return {x:f.x+r.x,y:f.y+r.y}; }));
    const pol=fpPolarity(f); if(pol){ for(const p of fpPads(f)){ if(pol[p.num]==='+'){ const s=0.45;
      g.line(ap,p.x-s,p.y,p.x+s,p.y); g.line(ap,p.x,p.y-s,p.x,p.y+s); } } }
  }
  return g.render(layer+' silkscreen'); }
function gerberOutline(){ const g=makeGerber(); const ap=g.circleAp(0.1);
  const o=state.project.pcb.outline||pcbBBox();
  g.poly(ap,[[o.x,o.y],[o.x+o.w,o.y],[o.x+o.w,o.y+o.h],[o.x,o.y+o.h],[o.x,o.y]].map(([x,y])=>({x,y})));
  return g.render('Edge cuts'); }
function buildDrill(){
  const holes=fabPads().filter(p=>p.drill>0).map(p=>({x:p.x,y:p.y,d:+p.drill.toFixed(3)}));
  const tools=new Map(); let tno=1; const order=[];
  for(const h of holes){ if(!tools.has(h.d)){ tools.set(h.d,tno++); order.push(h.d); } }
  let s='M48\n;DRILL file generated by PCB Studio\n;FORMAT={-:-/ absolute / metric / decimal}\nFMAT,2\nMETRIC\n';
  for(const d of order) s+='T'+tools.get(d)+'C'+d.toFixed(3)+'\n';
  s+='%\nG90\nG05\n';
  for(const d of order){ s+='T'+tools.get(d)+'\n';
    for(const h of holes){ if(h.d!==d)continue; s+='X'+h.x.toFixed(3)+'Y'+(-h.y).toFixed(3)+'\n'; } }
  s+='T0\nM30\n'; return s;
}
function bomJlcpcbString(){ const rows=buildBom(); let csv='Comment,Designator,Footprint,"LCSC Part #"\n';
  for(const r of rows) csv+=[csvq(r.value||r.desc),csvq(r.refs.join(',')),csvq(r.footprint),csvq(r.part)].join(',')+'\n';
  return csv; }
function cplString(){ let csv='Designator,Mid X,Mid Y,Layer,Rotation\n';
  for(const f of state.project.pcb.footprints){
    const ref=f.ref || (f.componentId&&compById(f.componentId)?compById(f.componentId).ref:'') ;
    if(!ref)continue;
    csv+=[ref, f.x.toFixed(3)+'mm', (-f.y).toFixed(3)+'mm', 'Top', ((f.rot||0)%360)].join(',')+'\n'; }
  return csv; }
function fabReadme(){ return [
  'PCB Studio — fabricage-export','',
  'Bevat: Gerber (RS-274X), Excellon-boorfile (.drl), assemblage-BOM en CPL (pick&place).',
  'Eenheden: mm. Lagen (KiCad-stijl namen, JLCPCB herkent ze automatisch):',
  '  *-F_Cu.gbr / *-B_Cu.gbr        top / bottom koper',
  '  *-F_Mask.gbr / *-B_Mask.gbr    top / bottom soldermask',
  '  *-F_Silkscreen.gbr             top silkscreen (courtyards + polariteit +)',
  '  *-Edge_Cuts.gbr                board outline',
  '  *.drl                          boringen (Excellon, metrisch)',
  '  *-bom.csv                      BOM in JLCPCB-formaat',
  '  *-cpl.csv                      pick&place / CPL in JLCPCB-formaat','',
  'BELANGRIJK: best-effort export uit een MVP-tool. Controleer ALTIJD in een gratis',
  'Gerber-viewer (bv. JLCPCB online viewer of KiCad GerbView) vóór je bestelt. Verifieer',
  'vooral pad-vormen, drill-maten en — bij assemblage — de CPL-rotaties per onderdeel.'
].join('\n'); }
function buildFabFiles(){ const b=fabBase(); return [
  {name:b+'-F_Cu.gbr',       text:gerberCopper('top')},
  {name:b+'-B_Cu.gbr',       text:gerberCopper('bottom')},
  {name:b+'-F_Mask.gbr',     text:gerberMask('top')},
  {name:b+'-B_Mask.gbr',     text:gerberMask('bottom')},
  {name:b+'-F_Silkscreen.gbr',text:gerberSilk('top')},
  {name:b+'-Edge_Cuts.gbr',  text:gerberOutline()},
  {name:b+'.drl',            text:buildDrill()},
  {name:b+'-bom.csv',        text:bomJlcpcbString()},
  {name:b+'-cpl.csv',        text:cplString()},
  {name:'README.txt',        text:fabReadme()},
]; }
// --- pure-JS ZIP (stored / no compression) ---
const _crcTable=(()=>{ const t=new Uint32Array(256); for(let n=0;n<256;n++){ let c=n;
  for(let k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0; } return t; })();
function crc32(bytes){ let c=0xFFFFFFFF; for(let i=0;i<bytes.length;i++) c=_crcTable[(c^bytes[i])&0xFF]^(c>>>8);
  return (c^0xFFFFFFFF)>>>0; }
function zipStore(files){
  const u16=n=>[n&255,(n>>8)&255]; const u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
  const enc=files.map(f=>({name:new TextEncoder().encode(f.name),data:new TextEncoder().encode(f.text)}));
  const parts=[]; const central=[]; let offset=0;
  for(const f of enc){ const crc=crc32(f.data), sz=f.data.length;
    const lh=new Uint8Array([].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),
      u32(crc),u32(sz),u32(sz),u16(f.name.length),u16(0)));
    parts.push(lh,f.name,f.data);
    const ch=new Uint8Array([].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),
      u32(crc),u32(sz),u32(sz),u16(f.name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset)));
    central.push(ch,f.name);
    offset+=lh.length+f.name.length+f.data.length;
  }
  let cenSize=0; central.forEach(c=>cenSize+=c.length);
  const end=new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(enc.length),u16(enc.length),
    u32(cenSize),u32(offset),u16(0)));
  const all=[...parts,...central,end]; let total=0; all.forEach(a=>total+=a.length);
  const out=new Uint8Array(total); let pos=0; for(const a of all){ out.set(a,pos); pos+=a.length; }
  return out;
}
function exportFabZip(){ const bytes=zipStore(buildFabFiles());
  const blob=new Blob([bytes],{type:'application/zip'}); const url=URL.createObjectURL(blob);
  const a=el('a',{href:url,download:fabBase()+'_gerber.zip'}); document.body.append(a); a.click();
  setTimeout(()=>{a.remove();URL.revokeObjectURL(url);},100); }

function openExport(){
  runDRC();
  const body=el('div');
  body.append(el('div',{class:'okbox',html:
    '<b>Fabricage-export (JLCPCB-klaar):</b> Gerber + boorfile + BOM + CPL als één ZIP. ' +
    'Best-effort uit een MVP-tool — <b>controleer altijd in een Gerber-viewer vóór je bestelt</b> ' +
    '(pad-vormen, drill-maten, en bij assemblage de CPL-rotaties).'}));
  if(!state.project.pcb.outline) body.append(el('div',{class:'warnbox',
    text:'Geen board-outline getekend — er wordt automatisch een bounding-box gebruikt. Teken een outline voor een exacte vorm.'}));
  if(state.drc.length) body.append(el('div',{class:'warnbox',
    text:'Let op: '+state.drc.length+' open DRC-waarschuwing(en).'}));
  body.append(el('div',{class:'row'},[
    el('button',{class:'on',onclick:exportFabZip},el('span',{text:'⤓ Gerber + drill + BOM + CPL (ZIP)'})),
  ]));
  body.append(el('div',{class:'row',style:'margin-top:6px'},[
    el('button',{onclick:()=>download(fabBase()+'-bom.csv',bomJlcpcbString(),'text/csv')},el('span',{text:'⤓ BOM (JLCPCB CSV)'})),
    el('button',{onclick:()=>download(fabBase()+'-cpl.csv',cplString(),'text/csv')},el('span',{text:'⤓ CPL / Pick&Place (CSV)'})),
    el('button',{onclick:()=>download(fabBase()+'.drl',buildDrill(),'text/plain')},el('span',{text:'⤓ Drill (Excellon)'})),
  ]));
  body.append(el('div',{class:'small',style:'margin:10px 0 2px',text:'Visuele referentie / overige formaten:'}));
  body.append(el('div',{class:'row'},[
    el('button',{onclick:()=>download('pcb_top.svg',exportSVG('top'),'image/svg+xml')},el('span',{text:'⤓ Top (SVG)'})),
    el('button',{onclick:()=>download('pcb_bottom.svg',exportSVG('bottom'),'image/svg+xml')},el('span',{text:'⤓ Bottom (SVG)'})),
    el('button',{onclick:()=>download('pcb_layout.json',exportPcbJson(),'application/json')},el('span',{text:'⤓ Layout (JSON)'})),
  ]));
  const prev=el('div',{style:'margin-top:12px;display:flex;gap:10px;flex-wrap:wrap'});
  prev.innerHTML='<div><div class="small">Top</div>'+exportSVG('top')+'</div>'+
                 '<div><div class="small">Bottom</div>'+exportSVG('bottom')+'</div>';
  prev.querySelectorAll('svg').forEach(s=>{s.style.maxWidth='320px';s.style.height='auto';
    s.style.border='1px solid var(--line)';s.style.borderRadius='6px';});
  body.append(prev);
  openModal('Export PCB — fabricage',body);
}
function exportProject(){ download((state.project.meta.name||'project')+'.pcbstudio.json',
  JSON.stringify(state.project,null,2),'application/json'); }
function importProject(file){ const r=new FileReader(); r.onload=()=>{
  try{ const p=JSON.parse(r.result);
    if(!p.sch||!p.pcb){ toast('Ongeldig projectbestand'); return; }
    snapshot(); state.project=p; state.netsDirty=true; state.selection=[];
    buildSidebar(); buildProps(); fitView(); autosave(); toast('Project geladen'); }
  catch(e){ toast('Kon bestand niet lezen'); } }; r.readAsText(file); }
function newProject(){ uiConfirm('Nieuw leeg project? Niet-geëxporteerd werk gaat verloren.')
  .then(ok=>{ if(!ok)return; snapshot(); state.project=blankProject(); state.netsDirty=true;
    state.selection=[]; buildSidebar(); buildProps(); fitView(); autosave(); }); }

/* modal + prompt helpers */
function openModal(title,bodyEl){ $('#modalTitle').textContent=title;
  const b=$('#modalBody'); b.innerHTML=''; b.append(bodyEl); $('#modal').classList.add('show'); }
function closeModal(){ $('#modal').classList.remove('show'); }
$('#modalClose').onclick=closeModal;
$('#modal').addEventListener('click',e=>{ if(e.target.id==='modal')closeModal(); });
function uiPrompt(title,def){ return new Promise(res=>{ const body=el('div');
  const i=el('input',{value:def||''}); body.append(i);
  const row=el('div',{class:'row',style:'margin-top:10px'});
  row.append(el('button',{onclick:()=>{closeModal();res(null);}},el('span',{text:'Annuleer'})));
  const ok=el('button',{class:'on',onclick:()=>{closeModal();res(i.value.trim());}},el('span',{text:'OK'}));
  row.append(ok); body.append(row); openModal(title,body); setTimeout(()=>i.focus(),50);
  i.onkeydown=e=>{if(e.key==='Enter'){closeModal();res(i.value.trim());}}; }); }
function uiConfirm(msg){ return new Promise(res=>{ const body=el('div');
  body.append(el('div',{class:'hint',text:msg}));
  const row=el('div',{class:'row',style:'margin-top:10px'});
  row.append(el('button',{onclick:()=>{closeModal();res(false);}},el('span',{text:'Nee'})));
  row.append(el('button',{class:'on',onclick:()=>{closeModal();res(true);}},el('span',{text:'Ja'})));
  body.append(row); openModal('Bevestig',body); }); }
let _toastTimer=null;
function toast(msg){ let t=$('#toast'); if(!t){ t=el('div',{id:'toast',
  style:'position:fixed;left:50%;bottom:64px;transform:translateX(-50%);background:#222d3c;'+
  'border:1px solid var(--line);padding:8px 14px;border-radius:8px;z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.4)'});
  document.body.append(t); } t.textContent=msg; t.style.display='block';
  clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>t.style.display='none',1800); }

function updateFloatBtns(){ const fb=$('#floatbtns'); fb.innerHTML='';
  if(state.wiring){ fb.append(el('button',{class:'on',onclick:finishWiring},el('span',{text:'✓ Klaar'})));
    fb.append(el('button',{onclick:cancelWiring},el('span',{text:'✕ Annuleer'}))); } }

/* status bar */
function buildStatus(){ const sb=$('#statusbar'); sb.innerHTML='';
  const n=state.tab==='sch'?nets():null;
  const add=(label,val,cls)=>{ sb.append(el('span',{},[document.createTextNode(label+' '),
    el('b',{text:String(val)})])); };
  sb.append(el('span',{class:'pill',text:state.tab==='sch'?'SCHEMA':'PCB'}));
  sb.append(el('span',{text:'Tool: '},)); sb.append(el('b',{text:state.tool[state.tab]}));
  if(state.tab==='sch'){ add('Comp:',state.project.sch.components.length);
    add('Draden:',state.project.sch.wires.length); add('Netten:',n.list.length); }
  else { add('Footprints:',state.project.pcb.footprints.length);
    add('Traces:',state.project.pcb.traces.length);
    sb.append(el('span',{class:'pill '+(state.drc.length?'err':'ok'),
      text:'DRC: '+state.drc.length})); }
  sb.append(el('span',{class:'spacer',style:'flex:1'}));
  if(state.tab!=='bom') sb.append(el('span',{text:'zoom '+fmt(view().scale,1)+'×'}));
  if(errors.length) sb.append(el('span',{class:'pill err',text:'JS err: '+errors.length}));
}

/* tabs */
$('#tabs').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  switchTab(b.getAttribute('data-tab')); });
function switchTab(tab){ state.tab=tab; cancelWiring(); outlineStart=null;
  document.querySelectorAll('#tabs button').forEach(b=>
    b.classList.toggle('on',b.getAttribute('data-tab')===tab));
  const showCanvas = tab!=='bom';
  $('#canvas-wrap').style.display=showCanvas?'block':'none';
  $('#sidebar').style.display=showCanvas?'block':'none';
  $('#props').style.display=showCanvas?'block':'none';
  if(tab==='bom'){ openBomTab(); }
  else { closeBomTab(); buildSidebar(); buildProps(); if(tab==='pcb')runDRC();
    requestAnimationFrame(()=>{resize();fitViewIfEmptyView();}); }
  buildStatus(); markDirty();
}
let _bomPanel=null;
function openBomTab(){ if(!_bomPanel){ _bomPanel=el('div',{id:'bompanel',
  style:'flex:1;overflow:auto;padding:16px'}); $('#main').append(_bomPanel); }
  _bomPanel.style.display='block'; _bomPanel.innerHTML='';
  _bomPanel.append(el('h3',{text:'Bill of Materials',style:'margin:0 0 10px'}));
  _bomPanel.append(buildBomView()); }
function closeBomTab(){ if(_bomPanel)_bomPanel.style.display='none'; }
function fitViewIfEmptyView(){ const v=view(); if(v.tx===0&&v.ty===0){ fitView(); } }

/* header buttons */
$('#btnUndo').onclick=undo; $('#btnRedo').onclick=redo; $('#btnFit').onclick=fitView;
$('#btnSave').onclick=()=>{ autosave(); toast('Opgeslagen (lokaal)'); };
$('#btnLib').onclick=openPartsManager;
$('#btnMenu').onclick=()=>$('#sidebar').classList.toggle('open');
$('#btnProps').onclick=()=>$('#props').classList.toggle('open');
$('#fileInput').onchange=e=>{ if(e.target.files[0])importProject(e.target.files[0]); e.target.value=''; };

function openPartsManager(){ const body=el('div');
  body.append(el('div',{class:'warnbox',html:'Lokale onderdelen-database (LCSC). Partnummers/prijzen zijn <b>schattingen</b>, laatst bijgewerkt jun 2026 — verifieer op lcsc.com.'}));
  const t=el('table'); function render(){ t.innerHTML='';
    t.append(el('tr',{},['Cat','Waarde','Omschrijving','LCSC','€','FP',''].map(th)));
    LCSC.forEach((p,i)=>t.append(el('tr',{},[td(p.cat),td(p.value),td(p.desc),td(p.part),
      td('€'+fmt(p.price,4)),td(p.fp),
      td(el('button',{class:'danger',onclick:()=>{LCSC.splice(i,1);saveLcsc(LCSC);render();},text:'✕'}))]))); }
  render();
  body.append(el('div',{class:'row',style:'margin:8px 0'},[
    el('button',{onclick:()=>{LCSC=DEFAULT_LCSC.slice();saveLcsc(LCSC);render();},},el('span',{text:'↺ Reset naar standaard'})),
  ]));
  body.append(t);
  openModal('Onderdelen-database',body);
}

/* ---------------- expose test hook ---------------- */
window.PCB={ state, nets:()=>nets(), computeNets, generateFootprints, runDRC,
  exportSVG, exportPcbJson, exportProject:()=>JSON.stringify(state.project),
  buildBom, switchTab, errors,
  addComponent:(type,x,y,opts)=>{ const def=SYMBOLS[type]; const c={id:uid('c'),type,x,y,rot:0,
    ref:nextRef(def.prefix),value:(opts&&opts.value)||def.defValue,lcsc:null};
    if(def.pinCount)c.pinCount=(opts&&opts.pinCount)||def.pinCount;
    state.project.sch.components.push(c); state.netsDirty=true; markDirty(); return c; },
  addWire:(pts)=>{ const w={id:uid('w'),points:pts}; state.project.sch.wires.push(w);
    state.netsDirty=true; markDirty(); return w; },
  addLabel:(x,y,name)=>{ const l={id:uid('l'),x,y,name}; state.project.sch.labels.push(l);
    state.netsDirty=true; return l; },
  partToSymbol, getLcsc:()=>LCSC,
  addPart:(p)=>{ LCSC.push(p); saveLcsc(LCSC); return p; },
  catalogCount, catalogSearch, catalogGet, catalogClear,
  catalogImportText:(text)=>importCatalog(stringFeed(text)),
  pkgToFp, catFromText, parsePrice,
  fabFiles:()=>{ const o={}; for(const f of buildFabFiles())o[f.name]=f.text; return o; },
  cplString, bomJlcpcbString, buildDrill,
  fabZipB64:()=>{ const b=zipStore(buildFabFiles()); let s=''; const C=0x8000;
    for(let i=0;i<b.length;i+=C) s+=String.fromCharCode.apply(null,b.subarray(i,i+C)); return btoa(s); },
  placeFromPart:(part,x,y)=>{ state.placePart=part; state.placeType='part';
    placeComponentAt({x,y}); const c=state.project.sch.components.slice(-1)[0];
    state.placePart=null; state.placeType=null; return c; },
  fit:fitView };

/* ---------------- init ---------------- */
function loop(){ if(state.dirty){ buildStatus(); draw(); } requestAnimationFrame(loop); }
function init(){
  try{ const j=localStorage.getItem('pcbstudio.project'); if(j){ const p=JSON.parse(j);
    if(p.sch&&p.pcb) state.project=p; } }catch(e){}
  resize(); buildSidebar(); buildProps(); switchTab('sch'); fitView(); loop();
}
init();
</script>
